<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIHTR // Deep Identity Holographic Tracking & Retrieval</title>
    <style>
        body { background-color: #0b0c10; color: #c5c6c7; font-family: 'Courier New', monospace; padding: 40px; margin: 0; }
        .console-container { max-width: 800px; margin: 0 auto; background: #1f2833; border: 2px solid #45a29e; padding: 30px; border-radius: 8px; box-shadow: 0 0 20px rgba(69,162,158,0.2); }
        h1 { color: #66fcf1; text-align: center; font-size: 24px; letter-spacing: 2px; }
        .upload-box { border: 2px dashed #45a29e; padding: 30px; text-align: center; margin: 20px 0; border-radius: 4px; background: #0b0c10; }
        input[type="file"] { display: none; }
        .custom-file-upload { display: inline-block; padding: 12px 24px; cursor: pointer; background: #45a29e; color: #0b0c10; font-weight: bold; border-radius: 4px; transition: 0.3s; }
        .custom-file-upload:hover { background: #66fcf1; }
        .action-btn { width: 100%; padding: 15px; background: #1f2833; border: 2px solid #66fcf1; color: #66fcf1; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; border-radius: 4px; transition: 0.3s; }
        .action-btn:hover { background: #66fcf1; color: #0b0c10; }
        .status-box { margin-top: 20px; padding: 15px; background: #0b0c10; border-left: 4px solid #45a29e; min-height: 50px; font-size: 14px; line-height: 1.6; }
        .metric-card { margin-top: 30px; display: none; background: #0b0c10; border: 1px solid #45a29e; padding: 20px; border-radius: 4px; }
        .score-large { font-size: 48px; color: #66fcf1; text-align: center; font-weight: bold; margin: 10px 0; }
        .progress-bar-bg { background: #1f2833; height: 10px; border-radius: 5px; overflow: hidden; margin: 15px 0; }
        .progress-bar-fill { background: #66fcf1; height: 100%; width: 0%; transition: width 0.5s ease-in-out; }
        .checkout-btn { display: block; width: 100%; padding: 12px; background: #45a29e; color: #0b0c10; text-align: center; text-decoration: none; font-weight: bold; border-radius: 4px; margin-top: 20px; cursor: not-allowed; opacity: 0.5; }
        .checkout-btn.unlocked { background: #28a745; color: white; cursor: pointer; opacity: 1; }
    </style>
</head>
<body>

<div class="console-container">
    <h1>DIHTR // FORENSIC ANALYSIS TERMINAL</h1>
    
    <div class="upload-box">
        <label class="custom-file-upload">
            <input type="file" id="audio-file-input" accept=".mp3,.wav,.flac" />
            SELECT CORE AUDIO DATA TAPE
        </label>
        <div id="file-name-display" style="margin-top: 15px; font-size: 12px; color: #45a29e;">NO TAPE MOUNTED</div>
    </div>

    <button id="analyze-trigger" class="action-btn">INITIATE DEEP INTEGRITY SCAN</button>
    
    <div id="status-console" class="status-box">SYSTEM STANDING BY. MOUNT VOCAL TRACK TO BEGIN INTEGRITY RETRIEVAL LAYER.</div>

    <div id="report-dashboard" class="metric-card">
        <div style="text-align: center; font-size: 14px; letter-spacing: 1px; color: #45a29e;">RESOLVED VOCAL INTEGRITY INDEX</div>
        <div id="vocal-score-display" class="score-large">--%</div>
        
        <div class="progress-bar-bg">
            <div id="vocal-progress-fill" class="progress-bar-fill"></div>
        </div>

        <div style="margin-top: 20px; font-size: 13px;">
            <p>🧬 <span id="trajectory-text" style="font-weight: bold;">EVALUATING TRAJECTORY...</span></p>
            <p>📉 <span id="drift-index-text">CALCULATING FLEXIBILITY DRIFT...</span></p>
            <p>🎯 <span id="velocity-map-text">MAPPING NOTE-GLIDE VELOCITY...</span></p>
        </div>

        <button id="checkout-action" class="checkout-btn">REPORT RECOVERY LOCKED // REQUIRES CLEARANCE</button>
    </div>
</div>

<script>
const fileInput = document.getElementById("audio-file-input");
const fileDisplay = document.getElementById("file-name-display");
const btn = document.getElementById("analyze-trigger");
const status = document.getElementById("status-console");
const dashboard = document.getElementById("report-dashboard");
const score = document.getElementById("vocal-score-display");
const fill = document.getElementById("vocal-progress-fill");
const trajectory = document.getElementById("trajectory-text");
const drift = document.getElementById("drift-index-text");
const velocity = document.getElementById("velocity-map-text");
const checkout = document.getElementById("checkout-action");

fileInput.addEventListener("change", function() {
    if (this.files.length > 0) {
        fileDisplay.innerText = "MOUNTED: " + this.files[0].name.toUpperCase();
    }
});

btn.addEventListener("click", function() {
    if (fileInput.files.length === 0) {
        status.innerHTML = "<span style='color: #ff4a4a;'>✕ REJECTED: NO COMPATIBLE AUDIO TAPE DETECTED IN STORAGE DRIVE.</span>";
        return;
    }

    const file = fileInput.files[0];
    const formData = new FormData();
    formData.append("file", file);

    btn.disabled = true;
    btn.innerHTML = "🔮 ANALYZING FORENSIC DATA CORE...";
    status.style.color = "#ffffff";
    status.innerHTML = "Isolating vocal spectrum and mapping note-glide trajectory...";

    fetch("https://onrender.com", {
        method: "POST",
        body: formData
    })
    .then(response => {
        if (!response.ok) throw new Error("Server infrastructure response anomaly.");
        return response.json();
    })
    .then(data => {
        btn.disabled = false;
        btn.innerHTML = "INITIATE DEEP INTEGRITY SCAN";
        
        if (data.success) {
            const finalScore = data.score;
            score.innerHTML = finalScore + "%";
            fill.style.width = finalScore + "%";
            dashboard.style.display = "block";

            trajectory.innerHTML = data.trajectory.toUpperCase();
            drift.innerHTML = data.drift_index.toUpperCase();
            velocity.innerHTML = data.velocity_map.toUpperCase();

            if (finalScore >= 85) {
                status.style.color = "#28a745";
                status.innerHTML = "✓ STATUS: 100% AUTHENTIC HUMAN VOICE DETECTED.";
            } else if (finalScore >= 70) {
                status.style.color = "#00adb5";
                status.innerHTML = "△ STATUS: HIGH INTEGRITY HYBRID RECONSTRUCTION CORE DETECTED.";
            } else {
                status.style.color = "#ff4a4a";
                status.innerHTML = "✕ STATUS: ARTIFICIAL QUANTIZATION & VELOCITY MACHINE MANIPULATION DETECTED.";
            }

            checkout.className = "checkout-btn unlocked";
            checkout.innerHTML = "UNLOCK FULL CORE SECURITY REPORT ($1.99)";
        } else {
            status.style.color = "#ff4a4a";
            status.innerHTML = "✕ ENGINE DIAGNOSTIC EXCEPTION: " + data.error.toUpperCase();
        }
    })
    .catch(error => {
        console.error(error);
        btn.disabled = false;
        btn.innerHTML = "INITIATE DEEP INTEGRITY SCAN";
        status.style.color = "#ff4a4a";
        status.innerHTML = "✕ PIPELINE ERROR: SERVER COMMUNICATION FAILURE. VERIFY CORE ENGINE IS LIVE.";
    });
});
</script>
</body>
</html>
